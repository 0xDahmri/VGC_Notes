site_name: VGC Notes
site_description: Competitive Pokemon VGC strategy notes and resources for the community.
site_url: https://0xDahmri.github.io/VGC_Notes
repo_url: https://github.com/0xDahmri/VGC_Notes
repo_name: 0xDahmri/VGC_Notes

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

extra_css:
  - css/champions-calc.css

extra_javascript:
  - js/champions-data.js
  - js/champions-calc.js

plugins:
  - search

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Where to Start:
    - Introduction: where-to-start/introduction.md
    - Getting Started: where-to-start/getting-started.md
    - VGC Rules: where-to-start/vgc-rules.md
    - "Understand Stats: EVs/IVs": where-to-start/understand-stats.md
    - Finding the Win Conditions: where-to-start/win-conditions.md
    - Building a Team: where-to-start/building-a-team.md
    - Research: where-to-start/research.md
    - Running Calculations: where-to-start/running-calculations.md
    - Before the Match: where-to-start/before-the-match.md
    - Meta Decisions: where-to-start/meta-decisions.md
    - Handling Archetypes: where-to-start/handling-archetypes.md
  - Tools:
    - Damage Calculator: tools/damage-calculator.md
  - Guides:
    - EV Spreads: guides/ev-spreads.md
  - Teams:
    - Sample Teams: teams/sample-teams.md
  - Generational Specific:
    - GEN1: gen1/index.md
    - GEN2: gen2/index.md
    - GEN3: gen3/index.md
    - GEN4: gen4/index.md
    - GEN5: gen5/index.md
    - GEN6: gen6/index.md
    - GEN7: gen7/index.md
    - GEN8: gen8/index.md
    - GEN9: gen9/index.md
    - GEN10: gen10/index.md
