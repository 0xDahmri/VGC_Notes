site_name: VGC Notes
site_description: Competitive Pokemon VGC strategy notes and resources for the community.
site_url: https://0xDahmri.github.io/VGC_Notes
repo_url: https://github.com/0xDahmri/VGC_Notes
repo_name: 0xDahmri/VGC_Notes

theme:
  name: material
  palette:
    - scheme: slate
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - attr_list

nav:
  - Home: index.md
  - Formats:
    - Regulation H: formats/regulation-h.md
  - Guides:
    - EV Spread Philosophy: guides/ev-spreads.md
  - Teams:
    - Sample Teams: teams/sample-teams.md
